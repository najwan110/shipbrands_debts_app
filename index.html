<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipBrands Debts</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#09090b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #09090b;
  --surface: #18181b;
  --border: #27272a;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.25);
  
  --red: #ef4444;
  --red-soft: rgba(239, 68, 68, 0.15);
  --green: #10b981;
  --green-soft: rgba(16, 185, 129, 0.15);
  
  --text: #f4f4f5;
  --muted: #a1a1aa;
  --subtle: #27272a;
  
  --sh: 0 4px 20px rgba(0, 0, 0, 0.3);
  --sh-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:880px;margin:0 auto;padding:24px 16px;position:relative;z-index:1;}

header{
  background: linear-gradient(135deg, #18181b 0%, #27272a 100%);
  color: #fff;
  border-radius: 24px;
  padding: 24px 28px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  flex-wrap: wrap;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 150px; height: 150px;
  background: var(--accent);
  filter: blur(80px);
  opacity: 0.4;
  pointer-events: none;
}
.h-left{display:flex;align-items:center;gap:16px; position:relative; z-index:2;}
.h-icon{width:54px;height:54px;background:rgba(255,255,255,0.05);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);}
.h-title h1{font-size:24px;font-weight:700;letter-spacing:-0.5px; background: linear-gradient(90deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.h-title p{font-size:13px;opacity:.7; margin-top:2px; font-weight:300;}
.h-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px; position:relative; z-index:2;}
.h-stats{display:flex;gap:12px;}
.hstat{text-align:center;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:12px 18px;min-width:110px; backdrop-filter: blur(5px);}
.hstat-val{font-size:18px;font-weight:700;font-family:'Outfit',monospace; letter-spacing:0.5px;}
.hstat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px; margin-top:4px;}
.hstat-outstanding{background:rgba(239,68,68,0.1) !important;border-color:rgba(239,68,68,0.2) !important;}
.hstat-outstanding .hstat-val{color:var(--red);}

/* CONTROLS */
.controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px 14px 44px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:all 0.3s ease;box-shadow:var(--sh);}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow);}
.s-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;}
.btn{padding:14px 20px;font-family:'Outfit',sans-serif;font-size:14px;border-radius:14px;border:none;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:8px;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);white-space:nowrap;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-glow);}
.btn-primary:hover{background:#4f46e5;box-shadow:0 6px 20px rgba(79,70,229,0.4); transform:translateY(-2px);}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:var(--sh);}
.btn-ghost:hover{background:var(--subtle); border-color:#3f3f46; transform:translateY(-2px);}
.btn-migrate{background:#f59e0b;color:#000;display:none;font-weight:700;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px; opacity:0; transition:opacity 0.3s;}
.overlay.open{display:flex; opacity:1;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:420px;box-shadow:var(--sh-lg); transform:translateY(20px); transition:transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); position:relative; overflow:hidden;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent);}
.overlay.open .modal{transform:translateY(0);}
.m-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.m-hd h2{font-size:20px;font-weight:700;}
.fg{margin-bottom:20px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.fg input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px 16px;outline:none;font-family:'Outfit',sans-serif;font-size:15px;transition:all 0.2s;}
.fg input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.m-ft{display:flex;gap:12px;justify-content:flex-end;margin-top:32px;}

/* CARDS */
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden;transition:all 0.3s ease;box-shadow:var(--sh);}
.ccard:hover{border-color:#3f3f46; transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.c-hd{display:flex;align-items:center;padding:20px;cursor:pointer;gap:16px;position:relative;}
.avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;background:linear-gradient(135deg, var(--accent), #8b5cf6);box-shadow:0 4px 12px var(--accent-glow);}
.cname{font-weight:600;font-size:17px;letter-spacing:-0.3px;}
.cmeta{font-size:13px;color:var(--muted);margin-top:4px;}
.cbadge{padding:6px 14px;border-radius:24px;font-size:13px;font-weight:600;font-family:'Outfit',monospace;}
.cbadge.owing{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.cbadge.settled{background:var(--green-soft);color:var(--green);border:1px solid rgba(16,185,129,0.2);}
.c-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border);margin-top:10px;animation:slideDown 0.3s ease;}
.ccard.open{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
.ccard.open .c-body{display:block;}

@keyframes slideDown{
  from{opacity:0;transform:translateY(-10px);}
  to{opacity:1;transform:translateY(0);}
}

.sbar{display:flex;gap:12px;margin:20px 0;}
.sbi{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.sbi-val{font-size:20px;font-weight:700;font-family:'Outfit',monospace;}
.sbi-lbl{font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:1px;}

.tx-list{display:flex;flex-direction:column;gap:8px;max-height:250px;overflow-y:auto;padding-right:4px; margin-bottom:20px;}
.tx-list::-webkit-scrollbar{width:6px;}
.tx-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
.tx-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:14px;transition:all 0.2s;}
.tx-item:hover{border-color:#3f3f46;background:#1e1e24;}
.tx-type{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;padding:4px 8px;border-radius:6px;}
.tx-debt{background:var(--red-soft);color:var(--red);}
.tx-pay{background:var(--green-soft);color:var(--green);}
.tx-amt{font-weight:700;font-family:'Outfit',monospace;margin-left:auto;font-size:15px;}
.tx-del{background:none;border:none;color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.tx-del:hover{background:var(--red-soft);color:var(--red);}

.qe{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:20px;}
.qe-row{display:flex;gap:12px;}
.qe-f{flex:1;}
.qe-f input{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px 16px;background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;outline:none;}
.qe-f input:focus{border-color:var(--accent);}
.btn-pay{background:var(--green-soft); color:var(--green); box-shadow:none;}
.btn-pay:hover{background:var(--green); color:#fff; box-shadow:0 6px 20px rgba(16,185,129,0.4);}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);color:var(--text);padding:14px 28px;border-radius:100px;font-size:14px;font-weight:500;z-index:999;transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);border:1px solid var(--border);box-shadow:var(--sh-lg);display:flex;align-items:center;gap:10px;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-left">
      <div class="h-icon">📒</div>
      <div class="h-title">
        <h1>ShipBrands Debts</h1>
        <p>Supabase Powered Tracking</p>
      </div>
    </div>
    <div class="h-right">
      <div class="h-stats">
        <div class="hstat"><div class="hstat-val" id="statIndebted">—</div><div class="hstat-lbl">Indebted</div></div>
        <div class="hstat hstat-outstanding"><div class="hstat-val" id="statOwing">—</div><div class="hstat-lbl">Outstanding</div></div>
      </div>
      <div id="syncLabel" style="font-size:11px;opacity:0.8;color:var(--green);">Connecting...</div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search customers...">
    </div>
    <button class="btn btn-migrate" id="btnMigrate">🚀 Migrate Data</button>
    <button class="btn btn-primary" id="btnNewCustomer">+ New Customer</button>
    <button class="btn btn-ghost" id="btnRefresh">↻ Sync</button>
  </div>

  <div id="customersList"></div>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="m-hd"><h2 id="modalTitle">New Customer</h2></div>
    <div class="fg">
      <label>Name</label>
      <input type="text" id="inpName" list="existingNames" autocomplete="off" placeholder="E.g. Ahmad">
      <datalist id="existingNames"></datalist>
      <div id="duplicateWarning" style="color:var(--red);font-size:11px;margin-top:6px;display:none;font-weight:600;">⚠️ Name already exists!</div>
    </div>
    <div class="fg" id="initDebtWrap">
      <label>Initial Debt</label>
      <input type="number" id="inpInitDebt" value="0">
    </div>
    <div class="m-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="btnSaveModal">Save Details</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://gzaxqfcfawdcodfxejqn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6YXhxZmNmYXdkY29kZnhlanFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzUzMjUsImV4cCI6MjA5MjQ1MTMyNX0.NhXZ3PcTBH9n57cffIrb2mz-znj69OfKZ2z8CQEW1rY';

let _supabase, customers = [], transactions = [], openCards = new Set();
let editingId = null;

const fmtMoney = n => '$' + Math.round(n || 0).toLocaleString();
const getTx = cid => transactions.filter(t => t.customer_id === cid);
const getBal = cid => getTx(cid).reduce((s,t) => s + (t.type === 'debt' ? +t.amount : -t.amount), 0);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

const updateStatus = (msg, color='var(--green)') => {
  const l = document.getElementById('syncLabel');
  l.textContent = msg; l.style.color = color;
};

async function init() {
  try {
    if (!window.supabase) throw new Error('Supabase SDK not loaded');
    _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await load();
  } catch(e) {
    updateStatus('Error: SDK Load Failed', 'var(--red)');
    console.error(e);
  }
}

async function load() {
  updateStatus('Syncing...');
  try {
    const { data: c, error: e1 } = await _supabase.from('debts_ledger_customers').select('*');
    const { data: t, error: e2 } = await _supabase.from('debts_ledger_transactions').select('*');
    
    if (e1 || e2) throw (e1 || e2);

    customers = c || [];
    transactions = t || [];
    
    if (customers.length === 0) document.getElementById('btnMigrate').style.display = 'block';
    else document.getElementById('btnMigrate').style.display = 'none';

    updateStatus('Synced · ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}));
    render();
  } catch(e) {
    updateStatus('Network Error', 'var(--red)');
    toast('⚠️ Connection Error: ' + e.message);
  }
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = customers.filter(c => c.name.toLowerCase().includes(q));
  
  const totalOwing = customers.reduce((s,c) => s + Math.max(0, getBal(c.id)), 0);
  const indebted = customers.filter(c => getBal(c.id) > 0).length;
  
  document.getElementById('statIndebted').textContent = indebted;
  document.getElementById('statOwing').textContent = fmtMoney(totalOwing);
  
  const el = document.getElementById('customersList');
  if (list.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">No records found.</div>';
    return;
  }

  el.innerHTML = list.map(c => {
    const bal = getBal(c.id);
    const txs = getTx(c.id).reverse();
    // Use consistent coloring or avatar styling
    const avatarGrad = bal > 0 ? 'linear-gradient(135deg, var(--accent), #8b5cf6)' : 'linear-gradient(135deg, #10b981, #059669)';
    return `
    <div class="ccard ${openCards.has(c.id)?'open':''}" id="card-${c.id}">
      <div class="c-hd" onclick="toggleCard('${c.id}')">
        <div class="avatar" style="background:${avatarGrad}">${c.name[0].toUpperCase()}</div>
        <div style="flex:1"><div class="cname">${c.name}</div><div class="cmeta">${txs.length} records</div></div>
        <div class="cbadge ${bal>0?'owing':'settled'}">${bal>0?fmtMoney(bal):'Settled ✓'}</div>
      </div>
      <div class="c-body">
        <div class="sbar">
          <div class="sbi"><div class="sbi-val">${fmtMoney(bal)}</div><div class="sbi-lbl">Balance</div></div>
        </div>
        <div class="tx-list">${txs.map(t => `
          <div class="tx-item">
            <span class="tx-type ${t.type==='debt'?'tx-debt':'tx-pay'}">${t.type==='debt'?'Debt':'Pay'}</span>
            <span class="tx-amt">${fmtMoney(t.amount)}</span>
            <button class="tx-del" onclick="delTx('${t.id}')">✕</button>
          </div>`).join('')}</div>
        <div class="qe">
          <div class="qe-row">
            <div class="qe-f"><input type="number" id="qa-${c.id}" placeholder="Enter amount..." style="flex:1;outline:none;"></div>
            <button class="btn btn-primary" onclick="addTx('${c.id}','debt')">＋ Debt</button>
            <button class="btn btn-pay" onclick="addTx('${c.id}','pay')">＋ Pay</button>
          </div>
        </div>
        <div style="margin-top:16px;display:flex;gap:12px;">
           <button class="btn btn-ghost" style="padding:10px 16px;font-size:13px;" onclick="editCust('${c.id}')">Edit Name</button>
           <button class="btn btn-ghost" style="padding:10px 16px;font-size:13px;color:var(--red); border-color:var(--red-soft);" onclick="delCust('${c.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('open');
  card.classList.contains('open') ? openCards.add(id) : openCards.delete(id);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('btnNewCustomer').onclick = () => {
  editingId = null;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalTitle').textContent = 'New Customer';
  document.getElementById('inpName').value = '';
  document.getElementById('inpInitDebt').value = '0';
  document.getElementById('initDebtWrap').style.display = 'block';
  document.getElementById('duplicateWarning').style.display = 'none';
  document.getElementById('btnSaveModal').disabled = false;
  
  // Populate suggestions
  const dl = document.getElementById('existingNames');
  dl.innerHTML = customers.map(c => `<option value="${c.name}">`).join('');
};

document.getElementById('inpName').oninput = (e) => {
  const val = e.target.value.trim().toLowerCase();
  const exactMatch = customers.some(c => c.name.toLowerCase() === val && c.id !== editingId);
  const warn = document.getElementById('duplicateWarning');
  const btn = document.getElementById('btnSaveModal');
  
  if (exactMatch) {
    warn.style.display = 'block';
    btn.disabled = true;
    btn.style.opacity = '0.5';
  } else {
    warn.style.display = 'none';
    btn.disabled = false;
    btn.style.opacity = '1';
  }
};

function editCust(id) {
  const c = customers.find(x => x.id === id);
  editingId = id;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalTitle').textContent = 'Edit Name';
  document.getElementById('inpName').value = c.name;
  document.getElementById('initDebtWrap').style.display = 'none';
  document.getElementById('duplicateWarning').style.display = 'none';
  document.getElementById('btnSaveModal').disabled = false;
  document.getElementById('btnSaveModal').style.opacity = '1';

  const dl = document.getElementById('existingNames');
  dl.innerHTML = customers.map(c => `<option value="${c.name}">`).join('');
}

document.getElementById('btnSaveModal').onclick = async () => {
  const name = document.getElementById('inpName').value.trim();
  if (!name) return;
  updateStatus('Saving...');
  try {
    if (editingId) {
       await _supabase.from('debts_ledger_customers').update({ name }).eq('id', editingId);
    } else {
       const id = Date.now().toString(36);
       await _supabase.from('debts_ledger_customers').insert({ id, name });
       const init = +document.getElementById('inpInitDebt').value;
       if (init > 0) await _supabase.from('debts_ledger_transactions').insert({ id: id+'t', customer_id: id, type: 'debt', amount: init });
    }
    closeModal(); load();
  } catch(e) { toast('Error saving'); }
};

async function addTx(cid, type) {
  const amount = +document.getElementById('qa-'+cid).value;
  if (amount > 0) {
    updateStatus('Adding...');
    await _supabase.from('debts_ledger_transactions').insert({ id: Date.now().toString(36), customer_id: cid, type, amount });
    load();
  }
}

async function delTx(tid) {
  if (confirm('Delete this record?')) { 
    updateStatus('Deleting...');
    await _supabase.from('debts_ledger_transactions').delete().eq('id', tid); 
    load(); 
  }
}

async function delCust(id) {
  if (confirm('Delete customer and all records?')) {
    updateStatus('Deleting...');
    await _supabase.from('debts_ledger_customers').delete().eq('id', id);
    load();
  }
}

document.getElementById('btnMigrate').onclick = async () => {
  const dataC = [
    { id: 'c1', name: 'Ahmad' }, { id: 'c2', name: 'Mohammad' }, { id: 'c3', name: 'Khalid' },
    { id: 'c4', name: 'Omar' }, { id: 'c5', name: 'Zaid' }, { id: 'c6', name: 'Laila' },
    { id: 'c7', name: 'Hasan' }, { id: 'c8', name: 'Sami' }, { id: 'c9', name: 'Fadi' },
    { id: 'c10', name: 'Yousef' }, { id: 'c11', name: 'Nour' }, { id: 'c12', name: 'Sara' }
  ];
  const dataT = [
